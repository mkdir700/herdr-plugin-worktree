# herdr-plugin.toml — manifest for the github-issue-worktree plugin.
#
# "Start from a GitHub issue" that goes further than naming a tab: it reads the
# issue's CONTENT (via `gh`), asks `claude -p` to draft meaningful names from
# that content, then creates a real git WORKTREE + BRANCH (not just a tab) and
# launches an agent inside it.
#
# Flow (see scripts/prompt.js):
#   1. paste an issue URL / number in the overlay, pick an agent
#   2. `gh issue view` pulls the title/body/labels
#   3. `claude -p` turns that into { branch, workspace } names
#      (deterministic `issue-<n>-<title-slug>` fallback if claude/naming fails)
#   4. `herdr worktree create --branch <branch> --label <workspace>` makes the
#      worktree — which also fires `worktree.created`, so the superset-bootstrap
#      plugin auto-runs the repo's setup in the fresh checkout
#   5. the chosen agent starts in the worktree's root pane, seeded with the issue
#
# NOTE: herdr 0.7.0's right-click menu does not render plugin actions, so trigger
# this via a keybinding (see config.toml) or `herdr plugin action invoke`. The
# contexts below are forward-looking metadata for when the menu becomes
# plugin-extensible.
#
# Requires `gh` (authenticated) and `node` >= 18 on PATH; `claude` on PATH is
# optional (only used to draft names — falls back to a title slug without it).

id = "github-issue-worktree"
name = "GitHub Issue/PR -> Worktree"
version = "0.2.0"
description = "Start a git worktree from a GitHub issue (new branch, claude-named), a PR (imports its remote head branch), or a raw branch name — auto-detected from the input."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos"]

[[actions]]
id = "start"
title = "Start worktree from GitHub issue/PR"
description = "Paste an issue ref (new branch, claude-named), a PR ref (imports the remote head branch), or a branch name; the plugin auto-detects which, creates a worktree, and launches an agent in it."
contexts = ["workspace", "tab", "pane"]
command = ["node", "scripts/open.js"]

[[panes]]
id = "prompt"
title = "GitHub Issue/PR -> Worktree"
placement = "overlay"
command = ["node", "scripts/prompt.js"]
